# ============================================================
# cert-manager Helm Values
# Manages TLS certificates (Let's Encrypt or self-signed)
# for applications exposed through the ingress controller.
# ============================================================

installCRDs: true

replicaCount: 2

nodeSelector:
  node-role.kubernetes.io/worker: "true"

# Resource limits suitable for t3.xlarge workers
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

webhook:
  replicaCount: 2
  nodeSelector:
    node-role.kubernetes.io/worker: "true"

cainjector:
  replicaCount: 1
  nodeSelector:
    node-role.kubernetes.io/worker: "true"

# Global settings
global:
  logLevel: 2

# Prometheus metrics (uncomment if deploying kube-prometheus-stack)
# prometheus:
#   enabled: true
#   servicemonitor:
#     enabled: true
