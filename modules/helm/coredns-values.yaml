# ============================================================
# CoreDNS Helm Values
# RKE2 ships with CoreDNS by default. This values file
# customizes the Corefile for your environment.
# ============================================================

# RKE2 includes CoreDNS as rke2-coredns — if you are updating
# the built-in one, use the rke2-coredns HelmChart CR instead.
# This file is for a standalone deployment via Helm.

replicaCount: 2

# Pin CoreDNS pods to worker nodes
nodeSelector:
  node-role.kubernetes.io/worker: "true"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            k8s-app: kube-dns

resources:
  limits:
    memory: 170Mi
  requests:
    cpu: 100m
    memory: 70Mi

service:
  name: kube-dns
  clusterIP: "10.96.0.10"   # Must be within service_cidr (10.96.0.0/12)

# ---- Corefile ----
# Customize forwarding, zone stubbing, and logging here.
# See docs/coredns-guide.md for full explanation.
servers:
  - zones:
      - zone: .
    port: 53
    plugins:
      - name: errors
      - name: health
        configBlock: |-
          lameduck 5s
      - name: ready
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |-
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: forward
        parameters: . /etc/resolv.conf
        configBlock: |-
          max_concurrent 1000
      - name: cache
        parameters: 30
      - name: loop
      - name: reload
      - name: loadbalance
